name: Weekly Timeline Reward

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  reward:
    runs-on: ubuntu-latest
    steps:
      - name: Check timeline activity and distribute rewards
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "=== 녹염 주간 타임라인 보상 배포 ==="
          
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%S)
          echo "기준일: $WEEK_AGO 이후"
          
          POSTS=$(curl -s "${SUPABASE_URL}/rest/v1/board_posts?select=author_code&reply_to=is.null&created_at=gte.${WEEK_AGO}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
          
          echo "조회된 게시글: $POSTS"
          
          ELIGIBLE=$(echo "$POSTS" | python3 -c "
          import json, sys
          posts = json.load(sys.stdin)
          counts = {}
          for p in posts:
              code = p['author_code']
              counts[code] = counts.get(code, 0) + 1
          eligible = [code for code, cnt in counts.items() if cnt >= 3]
          print(json.dumps(eligible))
          ")
          
          echo "보상 대상: $ELIGIBLE"
          
          for CODE in $(echo "$ELIGIBLE" | python3 -c "import json,sys; [print(c) for c in json.load(sys.stdin)]"); do
            echo "지급: $CODE (+5 안개 조각)"
            
            CURRENT=$(curl -s "${SUPABASE_URL}/rest/v1/invite_codes?select=currency&code=eq.${CODE}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Accept: application/json")
            
            CUR_VAL=$(echo "$CURRENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              print(data[0].get('currency', 0))
          else:
              print(0)
          ")
            NEW_VAL=$((CUR_VAL + 5))
            
            curl -s -X PATCH "${SUPABASE_URL}/rest/v1/invite_codes?code=eq.${CODE}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"currency\": ${NEW_VAL}}"
            
            echo "완료: $CODE ($CUR_VAL → $NEW_VAL)"
          done
          
          echo "=== 주간 보상 배포 완료 ==="
